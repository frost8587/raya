<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Raya Metaverse</title>

<style>

body{
margin:0;
overflow:hidden;
background:black;
font-family:Arial;
color:white;
}

#ui{
position:absolute;
top:20px;
left:50%;
transform:translateX(-50%);
background:rgba(0,0,0,0.6);
padding:15px;
border-radius:10px;
text-align:center;
z-index:10;
}

button{
padding:10px 20px;
border:none;
border-radius:20px;
background:#22c55e;
color:white;
cursor:pointer;
}

</style>

</head>

<body>

<div id="ui">

<h2>🌙 Raya Metaverse 🌙</h2>

<p>Click start and walk using WASD</p>

<button onclick="startWorld()">Enter Metaverse</button>

</div>

<audio id="music" loop>
<source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
</audio>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.134/examples/js/controls/PointerLockControls.js"></script>

<script>

let camera, scene, renderer, controls

let moveForward=false
let moveBackward=false
let moveLeft=false
let moveRight=false

function startWorld(){

document.getElementById("ui").style.display="none"

document.getElementById("music").play()

init()

}

/* scene */

function init(){

scene=new THREE.Scene()

camera=new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
)

renderer=new THREE.WebGLRenderer()

renderer.setSize(window.innerWidth,window.innerHeight)

document.body.appendChild(renderer.domElement)

/* controls */

controls=new THREE.PointerLockControls(camera,document.body)

document.body.addEventListener("click",()=>controls.lock())

scene.add(controls.getObject())

/* ground */

const groundGeo=new THREE.PlaneGeometry(200,200)

const groundMat=new THREE.MeshBasicMaterial({color:0x064e3b})

const ground=new THREE.Mesh(groundGeo,groundMat)

ground.rotation.x=-Math.PI/2

scene.add(ground)

/* mosque placeholder */

const mosqueGeo=new THREE.BoxGeometry(10,6,10)

const mosqueMat=new THREE.MeshBasicMaterial({color:0x222222})

const mosque=new THREE.Mesh(mosqueGeo,mosqueMat)

mosque.position.y=3

mosque.position.z=-20

scene.add(mosque)

/* moon */

const moonGeo=new THREE.SphereGeometry(4,32,32)

const moonMat=new THREE.MeshBasicMaterial({color:0xffffcc})

const moon=new THREE.Mesh(moonGeo,moonMat)

moon.position.set(20,15,-40)

scene.add(moon)

/* stars */

for(let i=0;i<2000;i++){

const starGeo=new THREE.SphereGeometry(0.1)

const starMat=new THREE.MeshBasicMaterial({color:0xffffff})

const star=new THREE.Mesh(starGeo,starMat)

star.position.set(
(Math.random()-0.5)*200,
Math.random()*100,
(Math.random()-0.5)*200
)

scene.add(star)

}

/* lantern lights */

for(let i=0;i<20;i++){

const light=new THREE.PointLight(0xffcc00,1,20)

light.position.set(
(Math.random()-0.5)*40,
3,
(Math.random()-0.5)*40
)

scene.add(light)

}

/* movement */

const velocity=new THREE.Vector3()

const direction=new THREE.Vector3()

document.addEventListener("keydown",e=>{

switch(e.code){

case "KeyW": moveForward=true; break
case "KeyS": moveBackward=true; break
case "KeyA": moveLeft=true; break
case "KeyD": moveRight=true; break

}

})

document.addEventListener("keyup",e=>{

switch(e.code){

case "KeyW": moveForward=false; break
case "KeyS": moveBackward=false; break
case "KeyA": moveLeft=false; break
case "KeyD": moveRight=false; break

}

})

/* animation */

function animate(){

requestAnimationFrame(animate)

direction.z=Number(moveForward)-Number(moveBackward)

direction.x=Number(moveRight)-Number(moveLeft)

velocity.x -= velocity.x * 0.1
velocity.z -= velocity.z * 0.1

velocity.z -= direction.z * 0.1
velocity.x -= direction.x * 0.1

controls.moveRight(-velocity.x)
controls.moveForward(-velocity.z)

renderer.render(scene,camera)

}

animate()

}

</script>

</body>
</html>
```
