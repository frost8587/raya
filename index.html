```html
<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>COSMIC Raya Experience</title>

<style>

body{
margin:0;
overflow:hidden;
font-family:Arial;
background:black;
color:white;
text-align:center;
}

#ui{
position:absolute;
top:20px;
left:50%;
transform:translateX(-50%);
background:rgba(0,0,0,0.5);
padding:15px;
border-radius:10px;
z-index:10;
}

input{
padding:8px;
border:none;
border-radius:5px;
}

button{
padding:8px 16px;
border:none;
border-radius:20px;
background:#22c55e;
color:white;
cursor:pointer;
}

</style>

</head>

<body>

<div id="ui">

🌙 COSMIC Raya Experience

<br><br>

<input id="name" placeholder="Your name">

<button onclick="wish()">Generate Wish</button>

<div id="wish"></div>

</div>

<audio id="music" loop>
<source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
</audio>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>

<script>

/* greeting */

function wish(){

let name=document.getElementById("name").value

if(name==="") name="Sahabat"

document.getElementById("wish").innerHTML=
"✨ Selamat Hari Raya "+name+" ✨<br>Maaf Zahir & Batin"

document.getElementById("music").play()

}

/* THREEJS SCENE */

const scene=new THREE.Scene()

const camera=new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
)

const renderer=new THREE.WebGLRenderer()

renderer.setSize(window.innerWidth,window.innerHeight)

document.body.appendChild(renderer.domElement)

/* stars */

const starGeo=new THREE.BufferGeometry()

const starCount=2000

const positions=[]

for(let i=0;i<starCount;i++){

positions.push(
(Math.random()-0.5)*2000,
(Math.random()-0.5)*2000,
(Math.random()-0.5)*2000
)

}

starGeo.setAttribute(
'position',
new THREE.Float32BufferAttribute(positions,3)
)

const starMat=new THREE.PointsMaterial({color:0xffffff})

const stars=new THREE.Points(starGeo,starMat)

scene.add(stars)

/* moon */

const moonGeo=new THREE.SphereGeometry(5,32,32)

const moonMat=new THREE.MeshBasicMaterial({color:0xffffcc})

const moon=new THREE.Mesh(moonGeo,moonMat)

moon.position.set(20,10,-30)

scene.add(moon)

/* lanterns */

function createLantern(){

const geo=new THREE.SphereGeometry(0.5,16,16)

const mat=new THREE.MeshBasicMaterial({color:0xffcc00})

const lantern=new THREE.Mesh(geo,mat)

lantern.position.set(
(Math.random()-0.5)*40,
Math.random()*10,
(Math.random()-0.5)*40
)

scene.add(lantern)

}

for(let i=0;i<20;i++) createLantern()

/* fireworks */

function createFirework(){

const geo=new THREE.SphereGeometry(0.2,8,8)

const mat=new THREE.MeshBasicMaterial({color:0xffaa00})

const particle=new THREE.Mesh(geo,mat)

particle.position.set(
(Math.random()-0.5)*40,
Math.random()*20,
(Math.random()-0.5)*40
)

scene.add(particle)

setTimeout(()=>scene.remove(particle),1000)

}

setInterval(createFirework,200)

/* camera */

camera.position.z=20

/* mouse movement */

document.addEventListener("mousemove",e=>{

camera.position.x=(e.clientX/window.innerWidth-0.5)*10

camera.position.y=-(e.clientY/window.innerHeight-0.5)*10

})

/* animation */

function animate(){

requestAnimationFrame(animate)

stars.rotation.y+=0.0005

renderer.render(scene,camera)

}

animate()

</script>

</body>
</html>
