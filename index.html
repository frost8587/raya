```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Legendary Raya Celebration</title>

<style>

body{
margin:0;
overflow:hidden;
font-family:Arial;
background:linear-gradient(#021b15,#064e3b);
color:white;
text-align:center;
}

/* canvas */

canvas{
position:fixed;
top:0;
left:0;
}

/* moon */

.moon{
position:absolute;
top:80px;
right:100px;
width:140px;
height:140px;
background:#fff4a3;
border-radius:50%;
box-shadow:0 0 70px gold;
animation:moonMove 40s linear infinite;
}

.moon:after{
content:"";
position:absolute;
left:40px;
top:10px;
width:140px;
height:140px;
background:#021b15;
border-radius:50%;
}

@keyframes moonMove{
0%{transform:translateX(0)}
50%{transform:translateX(-40px)}
100%{transform:translateX(0)}
}

/* clouds */

.cloud{
position:absolute;
top:120px;
width:200px;
height:60px;
background:white;
border-radius:50px;
opacity:0.2;
animation:cloudMove 60s linear infinite;
}

@keyframes cloudMove{
0%{left:-200px}
100%{left:110%}
}

/* skyline */

.skyline{
position:absolute;
bottom:0;
width:100%;
height:200px;
background:black;
clip-path:polygon(
0% 100%,0% 60%,10% 60%,10% 40%,20% 40%,20% 60%,
40% 60%,40% 30%,50% 10%,60% 30%,60% 60%,
80% 60%,80% 40%,90% 40%,90% 60%,100% 60%,100% 100%
);
}

/* panel */

.panel{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:rgba(0,0,0,0.5);
padding:30px;
border-radius:15px;
width:320px;
}

input{
padding:10px;
width:80%;
border:none;
border-radius:6px;
}

button{
margin-top:15px;
padding:10px 20px;
border:none;
border-radius:20px;
background:#22c55e;
color:white;
cursor:pointer;
}

/* ketupat */

.ketupat{
position:absolute;
font-size:35px;
animation:float 10s linear infinite;
}

@keyframes float{
0%{transform:translateY(100vh)}
100%{transform:translateY(-120vh)}
}

</style>
</head>

<body>

<canvas id="canvas"></canvas>

<div class="moon"></div>

<div class="cloud" style="top:150px"></div>
<div class="cloud" style="top:220px; animation-duration:80s;"></div>

<div class="panel">

<h2>🌙 Raya Wish Generator 🌙</h2>

<input id="nameInput" placeholder="Enter your name">

<br>

<button onclick="generateWish()">Generate Wish</button>

<div id="wish" style="margin-top:20px"></div>

</div>

<div class="skyline"></div>

<!-- ketupat -->

<div class="ketupat" style="left:10%">🟩</div>
<div class="ketupat" style="left:25%;animation-delay:2s;">🟩</div>
<div class="ketupat" style="left:40%;animation-delay:4s;">🟩</div>
<div class="ketupat" style="left:60%;animation-delay:1s;">🟩</div>
<div class="ketupat" style="left:80%;animation-delay:3s;">🟩</div>

<script>

function generateWish(){

let name=document.getElementById("nameInput").value

if(name==="") name="Sahabat"

document.getElementById("wish").innerHTML=
"✨ Selamat Hari Raya "+name+" ✨<br><br>Maaf Zahir & Batin.<br>Semoga Syawal membawa kebahagiaan dan keberkatan kepada anda dan keluarga."

createConfetti()

}

/* animation engine */

const canvas=document.getElementById("canvas")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let stars=[]
let fireworks=[]
let confetti=[]
let shooting=[]

for(let i=0;i<150;i++){
stars.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*2
})
}

/* fireworks */

function createFirework(){

let x=Math.random()*canvas.width
let y=Math.random()*canvas.height/2

for(let i=0;i<60;i++){
fireworks.push({
x:x,
y:y,
vx:(Math.random()-0.5)*6,
vy:(Math.random()-0.5)*6,
life:100
})
}

}

setInterval(createFirework,2000)

/* shooting stars */

setInterval(()=>{
shooting.push({
x:Math.random()*canvas.width,
y:0,
vx:6,
vy:6
})
},5000)

/* confetti */

function createConfetti(){
for(let i=0;i<120;i++){
confetti.push({
x:Math.random()*canvas.width,
y:-20,
vy:Math.random()*3+2
})
}
}

function animate(){

ctx.fillStyle="rgba(0,0,0,0.25)"
ctx.fillRect(0,0,canvas.width,canvas.height)

/* stars */

ctx.fillStyle="white"
stars.forEach(s=>{
ctx.beginPath()
ctx.arc(s.x,s.y,s.r,0,Math.PI*2)
ctx.fill()
})

/* fireworks */

fireworks.forEach((f,i)=>{
f.x+=f.vx
f.y+=f.vy
f.life--

ctx.fillStyle="gold"
ctx.fillRect(f.x,f.y,3,3)

if(f.life<=0) fireworks.splice(i,1)
})

/* confetti */

confetti.forEach((c,i)=>{
c.y+=c.vy
ctx.fillStyle="lime"
ctx.fillRect(c.x,c.y,4,4)
if(c.y>canvas.height) confetti.splice(i,1)
})

/* shooting stars */

shooting.forEach((s,i)=>{
s.x+=s.vx
s.y+=s.vy
ctx.fillStyle="white"
ctx.fillRect(s.x,s.y,3,3)
if(s.x>canvas.width || s.y>canvas.height) shooting.splice(i,1)
})

requestAnimationFrame(animate)

}

animate()

</script>

</body>
</html>
